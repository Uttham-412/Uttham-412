<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40"
            fill="none"
            stroke="#ffffff"
            stroke-opacity="0.05"/>
    </pattern>

    <filter id="blur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="1280" height="320" fill="url(#bg)"/>

  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Decorative Glow -->

  <circle cx="1080" cy="70"
          r="140"
          fill="#2563EB"
          opacity="0.18"
          filter="url(#blur)"/>

  <circle cx="1180" cy="240"
          r="90"
          fill="#38BDF8"
          opacity="0.15"
          filter="url(#blur)"/>

  <!-- Left Accent -->

  <rect
      x="80"
      y="55"
      width="6"
      height="210"
      rx="3"
      fill="url(#line)"/>

  <!-- Initials -->

  <circle
      cx="150"
      cy="90"
      r="32"
      fill="#0F172A"
      stroke="#38BDF8"
